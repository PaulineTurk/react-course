<!DOCTYPE html>
<html>

<head>
    <title>React Basics</title>
</head>

<body>

    <script> console.log("inject ts in script")</script>
    <script src="react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev@3.2.1/external-library.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        const div_native_dom = document.createElement('div-native-dom')
        div_native_dom.textContent = "div created from web api object document"
        document.body.appendChild(div_native_dom)

        const div_jsx = <div> div created from jsx</div>
        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(div_jsx);
    </script>
    <div class="js-container"></div>
</body>

</html>
