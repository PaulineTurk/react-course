<!DOCTYPE html>
<html>

<head>
    <title>Chapter 3.3</title>
</head>

<body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script type="text/babel">
        function ChatInput({ chatMessages, setChatMessages }) {
            const [inputText, setInputText] = React.useState('')
            const [isLoading, setIsLoading] = React.useState(false)

            function saveInput(event) {
                setInputText(event.target.value)
            }


            async function sendMessage() {
                setIsLoading(true)

                const newChatMessages = [...chatMessages,
                {
                    id: crypto.randomUUID(),
                    message: inputText,
                    sender: "user",
                }
                ]

                const chatMessagesWithLoadingResponse = [...newChatMessages,
                {
                    id: crypto.randomUUID(),
                    message: "Loading ...",
                    sender: "robot",
                }
                ]

                setChatMessages(chatMessagesWithLoadingResponse)
                setInputText('')

                const response = await Chatbot.getResponseAsync(inputText)
                const chatMessagesWithResponse = [...newChatMessages,
                {
                    id: crypto.randomUUID(),
                    message: response,
                    sender: "robot",
                }
                ]
                setChatMessages(chatMessagesWithResponse)
                setIsLoading(false)
            }

            function handleKeyDown(event) {
                if (event.key === "Enter") {
                    sendMessage()
                }
                if (event.key === "Escape") {
                    setInputText('')
                }
            }

            return (
                <>
                    <input
                        id="chatbot_input"
                        placeholder="Send a message to Chatbot"
                        size="30"
                        onChange={saveInput}
                        value={inputText}
                        onKeyDown={handleKeyDown}
                    >
                    </input>
                    <button onClick={sendMessage}
                        disabled={isLoading || inputText === ''}
                    >
                        Send
                    </button>
                </>
            )
        }

        function ChatMessage({ message, sender }) {
            return (
                <div>
                    {sender === "robot" &&
                        <img
                            src={"/image/robot.png"}
                            width="50"
                        />
                    }
                    {message}
                    {sender === "user" &&
                        <img
                            src={"/image/user.png"}
                            width="50"
                        />
                    }
                </div>
            )
        }

        function ChatMessages({ chatMessages }) {
            return (
                <>
                    {
                        chatMessages.map((chatMessage) => {
                            return (
                                <ChatMessage
                                    key={chatMessage.id}
                                    message={chatMessage.message}
                                    sender={chatMessage.sender}
                                />
                            )
                        })
                    }
                </>
            )
        }

        function App() {
            const [chatMessages, setChatMessages] = React.useState([
                {
                    id: "1",
                    message: "Hello chatbot",
                    sender: "user"
                },
                {
                    id: "2",
                    message: "Hello! How can I help you?",
                    sender: "robot"
                }
            ])
            return (
                <>
                    <ChatInput
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                    />
                    <ChatMessages
                        chatMessages={chatMessages}
                    />
                </>
            )
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
