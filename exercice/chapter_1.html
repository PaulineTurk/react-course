<!DOCTYPE html>
<html>

<head>
    <title>React Basics</title>
</head>

<body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script type="text/babel">
        const shipping_cost = 5
        const sock_price = 10
        const sock_number = 1
        const t_shirt_price = 8
        const t_shirt_number = 2

        const productCost = sock_price * sock_number + t_shirt_price * t_shirt_number

        const getContent = () => (
            <div>
                <p>Today is {dayjs().format('MMMM D')}</p>
                <p>Current time: {dayjs().format('HH:mm:ss')}</p>
                <p>Cotton socks</p>
                <p>Price: ${sock_price}</p>
                <button>Add to Cart</button>

                <p>Product cost: ${productCost}</p>
                <p>Shipping cost: ${shipping_cost}</p>
                <p>Total cost: ${productCost + shipping_cost}</p>
                <button>Place your order</button>

            </div>
        )
        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container)
        setInterval(() => (root.render(getContent())), 1000);
        clearInterval()

    </script>
</body>

</html>
